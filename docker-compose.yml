services:
  localstack:
    image: localstack/localstack:3
    container_name: ministack_local
    ports:
      - "4566:4566"
    environment:
      - SERVICES=lambda,apigateway,iam,cloudformation,s3,sts,ssm,dynamodb
      - DEBUG=0
      - DISABLE_CORS_CHECKS=1
      - EXTRA_CORS_ALLOWED_ORIGINS=*
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_DOCKER_NETWORK=mi-mercado-net
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
    networks:
      mi-mercado-net:
        aliases:
          - localstack
          - ministack_local
          - s3.localhost.localstack.cloud
          - cdk-hnb659fds-assets-000000000000-us-east-1.s3.localhost.localstack.cloud

  redis:
    image: redis:7-alpine
    container_name: mi-mercado-redis
    ports:
      - "6379:6379"
    networks:
      - mi-mercado-net

  cdk_env:
    build:
      context: .
      dockerfile: Dockerfile.cdk
    container_name: mi-mercado-cdk
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://ministack_local:4566
      - AWS_ENDPOINT_URL_S3=http://s3.localhost.localstack.cloud:4566
      - LOCALSTACK_HOSTNAME=ministack_local
    networks:
      - mi-mercado-net

networks:
  mi-mercado-net:
    name: mi-mercado-net
    driver: bridge

volumes:
  localstack_data:
