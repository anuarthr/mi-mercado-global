version: '3.9'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: mi-mercado-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    working_dir: /home/dynamodblocal

  redis:
    image: redis:7-alpine
    container_name: mi-mercado-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: mi-mercado-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - dynamodb-local
      - redis
    volumes:
      - ./app:/app
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8080 --workers 2 --reload
